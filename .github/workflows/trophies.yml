name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 6 * * *"    # runs daily at 06:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output

      - name: Generate trophies SVG
        uses: nicedoc/trophy-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          username: govindrajawat
          theme: radical
          no-frame: true
          column: 6
          output-path: trophies.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trophies.svg
          git diff --cached --quiet || git commit -m "chore: update trophies"
          git push
